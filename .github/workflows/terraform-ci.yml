name: Terraform CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_WORKING_DIR: terraform

jobs:

# ==========================================================
# Terraform Format
# ==========================================================

  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

# ==========================================================
# Terraform Validate
# ==========================================================

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    needs: fmt

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      # Validation does NOT need Azure
      - name: Terraform Init (local only)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

# ==========================================================
# Terraform TFLint
# ==========================================================

  lint:
    name: Terraform TFLint
    runs-on: ubuntu-latest

    needs: validate

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint

# ==========================================================
# Terraform Plan
# ==========================================================

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: lint

    # Dependabot has no Azure credentials
    if: github.actor != 'dependabot[bot]'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
      TF_VAR_resource_group_name: ${{ vars.TF_VAR_RESOURCE_GROUP_NAME }}
      TF_VAR_app_service_plan_name: ${{ vars.TF_VAR_APP_SERVICE_PLAN_NAME }}
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_tags: ${{ vars.TF_VAR_TAGS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Make scripts executable
        run: chmod +x ../scripts/*.sh

      - name: Terraform Init (Remote Backend)
        run: ../scripts/terraform-init.sh

      - name: Terraform Plan
        run: terraform plan -input=false